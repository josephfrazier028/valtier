# One-click deploy blueprint for Render (https://render.com).
# Render generates the security secrets automatically; you only paste your Stripe keys.
services:
  - type: web
    name: valtier-intelligence
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # --- auto-generated by Render (you don't touch these) ---
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATA_ENCRYPTION_KEY
        generateValue: true
      # --- you paste these in the Render dashboard ---
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
